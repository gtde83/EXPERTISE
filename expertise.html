<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:rgba(0,0,0,0)}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;background:#F5F7FA;color:#222;font-size:16px;-webkit-text-size-adjust:100%}
.topbar{background:#1F4E79;color:#fff;padding:11px 14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;position:sticky;top:0;z-index:200}
.topbar-title{flex:1;font-size:13px;letter-spacing:.06em;text-transform:uppercase;font-weight:500;white-space:nowrap}
.tbtn{padding:9px 13px;border-radius:8px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.1);color:#fff;font-size:14px;cursor:pointer;font-family:inherit;-webkit-appearance:none;touch-action:manipulation;white-space:nowrap}
.tbtn:active{opacity:.7}
.tbtn.g{border-color:rgba(91,140,90,.6);background:rgba(91,140,90,.25)}
.tbtn.b{border-color:rgba(46,117,182,.7);background:rgba(46,117,182,.35)}
.save-status{font-size:11px;color:rgba(255,255,255,.7);white-space:nowrap}
.main{max-width:820px;margin:0 auto;padding:16px 12px 90px}
.card{background:#fff;border:1px solid #BDD7EE;border-radius:12px;padding:16px;margin-bottom:18px}
.card-title{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#2E75B6;margin-bottom:12px;font-weight:700}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:480px){.fg2{grid-template-columns:1fr}}
.field label{display:block;font-size:11px;color:#666;margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em;font-weight:600}
.field input,.field textarea{width:100%;background:#fff;border:1px solid #D6DBE0;border-radius:8px;padding:9px 11px;font-size:15px;color:#222;font-family:inherit;-webkit-appearance:none;outline:none}
.field textarea{resize:none;min-height:48px;line-height:1.5}
.field input:focus,.field textarea:focus{border-color:#2E75B6}
.zone-card{background:#fff;border:1px solid #BDD7EE;border-radius:12px;overflow:hidden;margin-bottom:20px}
.zone-hdr{background:#1F4E79;color:#fff;padding:12px 15px;display:flex;align-items:center;gap:10px}
.zone-hdr input{flex:1;background:transparent;border:none;color:#fff;font-size:15px;font-family:inherit;outline:none;min-width:0}
.zone-hdr input::placeholder{color:rgba(255,255,255,.4)}
.zone-num{font-size:11px;opacity:.5;white-space:nowrap;text-transform:uppercase;letter-spacing:.06em}
.zone-body{padding:14px}
.sec{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:#2E75B6;margin:16px 0 8px;display:flex;align-items:center;gap:8px;font-weight:600}
.sec:first-child{margin-top:0}
.sec::after{content:'';flex:1;height:1px;background:#DEEBF7}
.sec-note{text-transform:none;letter-spacing:0;font-size:11px;color:#aaa;font-weight:400}
textarea.std{width:100%;background:#fff;border:1px solid #D6DBE0;border-radius:8px;padding:9px 11px;font-size:14px;color:#222;resize:none;min-height:46px;line-height:1.5;font-family:inherit;-webkit-appearance:none;outline:none}
.iobtn{width:100%;padding:13px;border-radius:8px;border:1.5px dashed #B8C4D0;background:#F2F7FC;color:#5a7894;font-size:14px;text-align:center;cursor:pointer;font-family:inherit;-webkit-appearance:none;touch-action:manipulation;display:block;margin-bottom:8px}
.iobtn:active{background:#e2ecf6}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:4px}
.abtn{width:100%;padding:11px;border-radius:8px;border:1px solid #D6DBE0;background:#F2F7FC;color:#444;font-size:14px;text-align:center;cursor:pointer;font-family:inherit;-webkit-appearance:none;touch-action:manipulation;display:block}
.abtn:active{background:#e2ecf6}
.abtn.blue{background:#1F4E79;border-color:#1F4E79;color:#fff}
.abtn.red{background:#FCEFEE;border-color:#E8C5C4;color:#C0504D}
.xs{padding:6px 10px;font-size:12px;border-radius:7px;border:1px solid rgba(220,60,60,.35);background:rgba(220,60,60,.12);color:#C0504D;cursor:pointer;font-family:inherit;-webkit-appearance:none;touch-action:manipulation;white-space:nowrap}
.photo-grid{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0 4px}
.pthumb{position:relative;width:82px;height:82px;border-radius:8px;overflow:hidden;border:1px solid #BDD7EE;flex-shrink:0}
.pthumb img{width:100%;height:100%;object-fit:cover;display:block}
.pthumb .xbtn{position:absolute;top:3px;right:3px;width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,.55);border:none;color:#fff;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;touch-action:manipulation}
.plan-wrap{border-radius:8px;overflow:hidden;border:1px solid #BDD7EE;margin-bottom:8px;-webkit-user-select:none;user-select:none;touch-action:none}
.plan-wrap canvas{display:block;width:100%;height:auto}
.hr{height:1px;background:#DEEBF7;margin:14px 0}
.desordre{border:1px solid #BDD7EE;border-radius:10px;margin-bottom:12px;overflow:hidden}
.d-hdr{background:#DEEBF7;padding:10px 13px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #BDD7EE;flex-wrap:wrap}
.d-hdr input{flex:1;background:transparent;border:none;font-size:14px;color:#1F4E79;font-weight:600;font-family:inherit;outline:none;min-width:120px}
.d-hdr input::placeholder{color:#8aa4c2;font-weight:400}
.dbadge{background:#1F4E79;color:#fff;font-size:12px;padding:3px 10px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.d-body{padding:13px}
.loc-input{width:100%;background:#FFFBF0;border:1px solid #F0D898;border-radius:8px;padding:9px 11px;font-size:14px;color:#6a5010;font-family:inherit;-webkit-appearance:none;outline:none;margin-bottom:4px}
.loc-input::placeholder{color:#c0a860}
.obs-row{display:flex;gap:8px;margin-bottom:8px;align-items:flex-start}
.obs-row textarea{flex:1;background:#fff;border:1px solid #D6DBE0;border-radius:8px;padding:8px 10px;font-size:14px;color:#222;resize:none;min-height:40px;line-height:1.5;font-family:inherit;-webkit-appearance:none;outline:none}
.obs-row .xbtn2{width:36px;height:36px;flex-shrink:0;border-radius:8px;border:1px solid #E8C5C4;background:#FCEFEE;color:#C0504D;cursor:pointer;font-size:16px;padding:0;touch-action:manipulation;-webkit-appearance:none}
.conclu{width:100%;background:#FFF3DC;border:1px solid #F0C878;border-radius:8px;padding:10px 12px;font-size:14px;color:#7a4a08;resize:none;min-height:58px;line-height:1.5;font-family:inherit;-webkit-appearance:none;outline:none}
.anno-block{border:1px solid #BDD7EE;border-radius:8px;margin-bottom:10px;overflow:hidden}
.anno-hdr{background:#DEEBF7;padding:7px 10px;display:flex;align-items:center;gap:6px;border-bottom:1px solid #BDD7EE;flex-wrap:wrap}
.anno-hdr .fname{flex:1;font-size:12px;color:#5a7894;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:60px}
.ps-btn{padding:4px 9px;font-size:11px;border-radius:6px;border:1px solid #BDD7EE;background:#fff;color:#5a7894;cursor:pointer;-webkit-appearance:none;font-family:inherit;touch-action:manipulation}
.ps-btn.on{background:#1F4E79;color:#fff;border-color:#1F4E79}
.anno-hdr .del{width:30px;height:30px;border-radius:6px;border:1px solid #E8C5C4;background:#FCEFEE;color:#C0504D;cursor:pointer;font-size:14px;padding:0;touch-action:manipulation;-webkit-appearance:none}
.anno-cv{background:#000;touch-action:none;-webkit-user-select:none;user-select:none}
.anno-cv canvas{display:block;width:100%;height:auto}
.anno-tb{display:flex;align-items:center;gap:5px;padding:8px 10px;background:#F2F7FC;border-top:1px solid #BDD7EE;flex-wrap:wrap}
.toolbtn{width:34px;height:34px;border-radius:7px;border:1px solid #D6DBE0;background:#fff;cursor:pointer;font-size:16px;padding:0;touch-action:manipulation;-webkit-appearance:none}
.toolbtn.on{background:#DEEBF7;border-color:#2E75B6}
.cswatch{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;flex-shrink:0;touch-action:manipulation}
.cswatch.on{border-color:#1F4E79;transform:scale(1.15)}
.szbtn{width:30px;height:30px;border-radius:7px;border:1px solid #D6DBE0;background:#fff;cursor:pointer;padding:0;touch-action:manipulation;-webkit-appearance:none;display:flex;align-items:center;justify-content:center}
.szbtn.on{background:#DEEBF7;border-color:#2E75B6}
.spx{flex:1}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:#1F4E79;color:#fff;padding:11px 22px;border-radius:24px;font-size:14px;opacity:0;pointer-events:none;transition:opacity .25s;z-index:9999;white-space:nowrap;max-width:90vw;text-align:center;box-shadow:0 4px 12px rgba(0,0,0,.2)}
.toast.show{opacity:1}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9998;display:none;align-items:center;justify-content:center;padding:20px}
.modal.show{display:flex}
.modal-box{background:#fff;border-radius:12px;padding:20px;max-width:340px;width:100%}
.modal-box h3{font-size:16px;color:#1F4E79;margin-bottom:10px}
.modal-box p{font-size:14px;color:#555;margin-bottom:16px;line-height:1.5}
.modal-btns{display:flex;gap:8px}
.modal-btns button{flex:1;padding:11px;border-radius:8px;border:none;font-size:14px;cursor:pointer;font-family:inherit;-webkit-appearance:none}
.modal-btns .ok{background:#1F4E79;color:#fff}
.modal-btns .cancel{background:#eee;color:#444}
</style>
</head>
<body>

<div class="topbar">
  <span class="topbar-title">🏗 Expertise</span>
  <span class="save-status" id="save-status">—</span>
  <button class="tbtn b" id="btn-load">↩ Reprendre</button>
  <button class="tbtn g" id="btn-json">💾 JSON</button>
  <button class="tbtn" id="btn-word">📄 Word</button>
</div>

<input type="file" id="session-file" accept=".json,application/json" style="position:absolute;left:-9999px;width:1px;height:1px;opacity:0">

<div class="main">
  <div class="card">
    <div class="card-title">Informations du rapport</div>
    <div class="fg2">
      <div class="field"><label>Chantier / Adresse</label><input type="text" id="m-adr" placeholder="29 rue Decazes"></div>
      <div class="field"><label>Date de visite</label><input type="date" id="m-date"></div>
      <div class="field"><label>Donneur d'ordre</label><input type="text" id="m-client" placeholder="Nom du client"></div>
      <div class="field"><label>Expert</label><input type="text" id="m-expert" placeholder="Votre nom"></div>
      <div class="field" style="grid-column:1/-1"><label>Contexte général</label><textarea id="m-ctx" rows="2" placeholder="Description générale, contexte de la mission…"></textarea></div>
    </div>
  </div>

  <div id="zones"></div>
  <button class="abtn blue" id="btn-add-zone" style="padding:15px;font-size:15px;margin-top:4px">+ Ajouter une zone</button>

  <div class="card" style="margin-top:20px;border-color:#F0C878;background:#FFFDF8">
    <div class="card-title" style="color:#A05010">Conclusion générale du rapport</div>
    <textarea id="m-conclu-gen" class="conclu" rows="4" placeholder="Synthèse globale, recommandations générales, suite à donner…"></textarea>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="modal" id="restore-modal">
  <div class="modal-box">
    <h3>Reprendre votre travail ?</h3>
    <p id="restore-text"></p>
    <div class="modal-btns">
      <button class="cancel" id="btn-discard">Nouveau</button>
      <button class="ok" id="btn-restore">Reprendre</button>
    </div>
  </div>
</div>

<script>
'use strict';
/* ═══════════════════════════════════════════════
   ÉTAT GLOBAL — source de vérité unique
   Chaque zone/désordre/photo est un objet JS.
   Le DOM référence les objets via closures (pas d'IDs).
═══════════════════════════════════════════════ */
var S = { meta:{adresse:'',date:'',client:'',expert:'',contexte:'',conclusion_generale:''}, zones:[] };
var AUTOSAVE_KEY='expertise_v2_autosave';
var isLoading=false;
var autoTimer=null;

var COLS=['#d93025','#e67e22','#27ae60','#2980d9','#ffffff','#1c1c1a'];
var BRUSH=[3,7,14];
var TOOLS=[['pen','✏️'],['circle','⭕'],['arrow','↗️'],['eraser','⌫']];

/* ── utilitaires ── */
function $(id){return document.getElementById(id)}
function el(tag,cls,html){var e=document.createElement(tag);if(cls)e.className=cls;if(html!==undefined)e.innerHTML=html;return e}
function toast(m){var t=$('toast');t.textContent=m;t.className='toast show';setTimeout(function(){t.className='toast'},2600)}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function escBr(s){return esc(s).replace(/\n/g,'<br>')}

/* ── autosave ── */
function markDirty(){
  if(isLoading)return;
  if(autoTimer)clearTimeout(autoTimer);
  autoTimer=setTimeout(saveLocal,1200);
}
function saveLocal(){
  if(isLoading)return;
  try{
    localStorage.setItem(AUTOSAVE_KEY,JSON.stringify(serialize()));
    var n=new Date();
    $('save-status').textContent='✓ '+n.getHours()+':'+('0'+n.getMinutes()).slice(-2);
  }catch(e){$('save-status').textContent='⚠ mémoire'}
}
setInterval(saveLocal,30000);

/* ── sérialisation (état → JSON) ── */
function serialize(){
  syncMeta();
  return {
    meta:{adresse:S.meta.adresse,date:S.meta.date,client:S.meta.client,expert:S.meta.expert,contexte:S.meta.contexte,conclusion_generale:S.meta.conclusion_generale},
    zones:S.zones.map(function(z){
      return {
        zone:z.nom, description:z.description,
        plan:{ image:z.plan.canvas&&z.plan.img?z.plan.canvas.toDataURL('image/jpeg',.82):null, markers:z.plan.markers.slice() },
        photos_zone:z.photos.map(function(p){return{src:p.src,name:p.name}}),
        desordres:z.desordres.map(function(d,di){
          return {
            numero:di+1, titre:d.titre, localisation:d.localisation,
            observations:d.observations.slice(),
            dplan:{ image:d.dplan.canvas&&d.dplan.img?d.dplan.canvas.toDataURL('image/jpeg',.82):null, markers:d.dplan.markers.slice() },
            photos:d.photos.map(function(p){return{name:p.name,src:p.src,photoSize:p.photoSize,annotated:p.canvas?p.canvas.toDataURL('image/jpeg',.82):(p.annotated||p.src)}}),
            conclusion:d.conclusion
          };
        })
      };
    })
  };
}
function syncMeta(){
  S.meta.adresse=$('m-adr').value;S.meta.date=$('m-date').value;
  S.meta.client=$('m-client').value;S.meta.expert=$('m-expert').value;
  S.meta.contexte=$('m-ctx').value;S.meta.conclusion_generale=$('m-conclu-gen').value;
}

/* ── désérialisation (JSON → état + DOM) ── */
function loadFromJSON(data){
  isLoading=true;
  S.zones=[];
  $('zones').innerHTML='';
  S.meta=data.meta||{};
  $('m-adr').value=S.meta.adresse||'';
  $('m-date').value=S.meta.date||'';
  $('m-client').value=S.meta.client||'';
  $('m-expert').value=S.meta.expert||'';
  $('m-ctx').value=S.meta.contexte||'';
  $('m-conclu-gen').value=S.meta.conclusion_generale||'';
  (data.zones||[]).forEach(function(zd){
    var zone=createZone();
    zone.nom=zd.zone||'';zone.description=zd.description||'';
    zone.dom.titleInput.value=zone.nom;
    zone.dom.descInput.value=zone.description;
    if(zd.plan&&zd.plan.image)loadPlanImage(zone.plan,zd.plan.image,zd.plan.markers||[]);
    (zd.photos_zone||[]).forEach(function(p){addZonePhotoObj(zone,p)});
    (zd.desordres||[]).forEach(function(dd){
      var d=createDesordre(zone);
      d.titre=dd.titre||'';d.localisation=dd.localisation||'';d.conclusion=dd.conclusion||'';
      d.dom.titleInput.value=d.titre;
      d.dom.locInput.value=d.localisation;
      d.dom.concluInput.value=d.conclusion;
      (dd.observations||[]).forEach(function(o){addObs(d,o)});
      if(dd.dplan&&dd.dplan.image)loadPlanImage(d.dplan,dd.dplan.image,dd.dplan.markers||[]);
      (dd.photos||[]).forEach(function(p){addAnnoPhoto(d,p,true)});
    });
  });
  setTimeout(function(){isLoading=false;saveLocal()},800);
}

/* ── file picker (iPad-safe : input 1px hors écran) ── */
function pickFile(opts,cb){
  var old=$('__fp');if(old)old.remove();
  var inp=document.createElement('input');
  inp.type='file';inp.id='__fp';
  inp.accept=opts.accept||'image/*';
  if(opts.multiple)inp.multiple=true;
  if(opts.capture)inp.setAttribute('capture',opts.capture);
  inp.style.cssText='position:absolute;left:-9999px;top:0;width:1px;height:1px;opacity:0';
  document.body.appendChild(inp);
  var done=false;
  function clean(){if(done)return;done=true;if(inp.parentNode)inp.remove()}
  inp.addEventListener('change',function(){
    if(inp.files&&inp.files.length)cb(inp.files);
    clean();
  });
  window.addEventListener('focus',function fh(){window.removeEventListener('focus',fh);setTimeout(clean,1200)});
  inp.click();
}
function readAsDataURL(file,cb){var r=new FileReader();r.onload=function(e){cb(e.target.result)};r.readAsDataURL(file)}

/* ═══ PLAN générique (zone ou désordre) ═══ */
function makePlanState(){return{img:null,markers:[],imgObj:null,canvas:null,ctx:null}}
function loadPlanImage(plan,src,markers){
  plan.img=src;plan.markers=markers||[];
  plan.showFn(); // affiche le bloc canvas
  var img=new Image();
  img.onload=function(){
    var mw=Math.min(img.width,760),sc=mw/img.width;
    plan.canvas.width=Math.round(img.width*sc);
    plan.canvas.height=Math.round(img.height*sc);
    plan.imgObj=img;plan.ctx=plan.canvas.getContext('2d');
    drawPlan(plan);
  };
  img.src=src;
}
function drawPlan(p){
  if(!p.ctx||!p.imgObj)return;
  var cv=p.canvas;
  p.ctx.clearRect(0,0,cv.width,cv.height);
  p.ctx.drawImage(p.imgObj,0,0,cv.width,cv.height);
  p.markers.forEach(function(m){
    p.ctx.fillStyle='#d93025';p.ctx.beginPath();p.ctx.arc(m.x,m.y,17,0,Math.PI*2);p.ctx.fill();
    p.ctx.strokeStyle='#fff';p.ctx.lineWidth=2.5;p.ctx.beginPath();p.ctx.arc(m.x,m.y,17,0,Math.PI*2);p.ctx.stroke();
    p.ctx.fillStyle='#fff';p.ctx.font='bold 14px -apple-system,Arial';p.ctx.textAlign='center';p.ctx.textBaseline='middle';
    p.ctx.fillText(m.num,m.x,m.y);
  });
}
function buildPlanUI(plan,container,labelText,withCamera){
  var sec=el('div','sec',esc(labelText)+' <span class="sec-note">— tapez sur le plan pour poser un repère</span>');
  container.appendChild(sec);
  var importBtn=el('button','iobtn','📐 Importer un plan');
  importBtn.type='button';
  container.appendChild(importBtn);
  var row=null;
  if(withCamera){
    row=el('div','row2');
    var camBtn=el('button','abtn','📷 Photo du plan');camBtn.type='button';
    var libBtn=el('button','abtn','🖼 Photothèque');libBtn.type='button';
    row.appendChild(camBtn);row.appendChild(libBtn);
    container.appendChild(row);
    camBtn.addEventListener('click',function(){pickFile({capture:'environment'},function(fs){readAsDataURL(fs[0],function(src){loadPlanImage(plan,src,[]);markDirty()})})});
    libBtn.addEventListener('click',function(){pickFile({},function(fs){readAsDataURL(fs[0],function(src){loadPlanImage(plan,src,[]);markDirty()})})});
  }
  importBtn.addEventListener('click',function(){pickFile({},function(fs){readAsDataURL(fs[0],function(src){loadPlanImage(plan,src,[]);markDirty()})})});

  var planBox=el('div');planBox.style.display='none';
  var wrap=el('div','plan-wrap');
  var cv=document.createElement('canvas');
  wrap.appendChild(cv);planBox.appendChild(wrap);
  var btns=el('div','row3');
  var undoB=el('button','abtn','↩ Annuler');undoB.type='button';
  var clrB=el('button','abtn','🗑 Effacer');clrB.type='button';
  var chgB=el('button','abtn red','✕ Changer');chgB.type='button';
  btns.appendChild(undoB);btns.appendChild(clrB);btns.appendChild(chgB);
  planBox.appendChild(btns);
  container.appendChild(planBox);

  plan.canvas=cv;
  plan.showFn=function(){importBtn.style.display='none';if(row)row.style.display='none';planBox.style.display='block'};
  plan.hideFn=function(){importBtn.style.display='';if(row)row.style.display='';planBox.style.display='none'};

  function tap(ev){
    if(!plan.imgObj)return;
    var r=cv.getBoundingClientRect();
    var sx=cv.width/r.width,sy=cv.height/r.height;
    var t=ev.changedTouches?ev.changedTouches[0]:ev;
    var x=(t.clientX-r.left)*sx,y=(t.clientY-r.top)*sy;
    plan.markers.push({x:x,y:y,num:plan.markers.length+1});
    drawPlan(plan);markDirty();
  }

/* ═══ PHOTO ANNOTÉE ═══ */
function addAnnoPhoto(d,p,restored){
  var photo={src:p.src,name:p.name||'photo',photoSize:p.photoSize||'standard',annotated:p.annotated||null,canvas:null,state:null};
  d.photos.push(photo);

  var block=el('div','anno-block');
  var hdr=el('div','anno-hdr');
  var fn=el('span','fname',esc(photo.name));
  var lbl=el('span','', 'Taille :');lbl.style.cssText='font-size:10px;color:#5a7894';
  var bStd=el('button','ps-btn'+(photo.photoSize==='standard'?' on':''),'Std');bStd.type='button';
  var bGrd=el('button','ps-btn'+(photo.photoSize==='grande'?' on':''),'Grande');bGrd.type='button';
  var del=el('button','del','✕');del.type='button';
  hdr.appendChild(fn);hdr.appendChild(lbl);hdr.appendChild(bStd);hdr.appendChild(bGrd);hdr.appendChild(del);
  block.appendChild(hdr);

  var cw=el('div','anno-cv');
  var cv=document.createElement('canvas');
  cw.appendChild(cv);block.appendChild(cw);

  var tb=el('div','anno-tb');
  var toolBtns={};
  TOOLS.forEach(function(t){
    var b=el('button','toolbtn'+(t[0]==='pen'?' on':''),t[1]);b.type='button';
    toolBtns[t[0]]=b;tb.appendChild(b);
    b.addEventListener('click',function(){
      photo.state.tool=t[0];
      TOOLS.forEach(function(tt){toolBtns[tt[0]].className='toolbtn'+(tt[0]===t[0]?' on':'')});
    });
  });
  tb.appendChild(Object.assign(el('div'),{style:'width:4px'}));
  var colDots={};
  COLS.forEach(function(c){
    var s=el('div','cswatch'+(c==='#d93025'?' on':''));
    s.style.background=c;if(c==='#ffffff')s.style.outline='1px solid #ccc';
    colDots[c]=s;tb.appendChild(s);
    s.addEventListener('click',function(){
      photo.state.color=c;
      COLS.forEach(function(cc){colDots[cc].className='cswatch'+(cc===c?' on':'')});
    });
  });
  tb.appendChild(Object.assign(el('div'),{style:'width:4px'}));
  var szBtns={};
  BRUSH.forEach(function(sz,i){
    var b=el('button','szbtn'+(i===0?' on':''));b.type='button';
    var ss=sz+8;
    b.innerHTML='<svg width="'+ss+'" height="'+ss+'"><circle cx="'+(ss/2)+'" cy="'+(ss/2)+'" r="'+(sz/2+1)+'" fill="currentColor"/></svg>';
    szBtns[sz]=b;tb.appendChild(b);
    b.addEventListener('click',function(){
      photo.state.size=sz;
      BRUSH.forEach(function(z){szBtns[z].className='szbtn'+(z===sz?' on':'')});
    });
  });
  var spx=el('div','spx');tb.appendChild(spx);
  var undoB=el('button','toolbtn','↩');undoB.type='button';undoB.title='Annuler le dernier trait';
  tb.appendChild(undoB);
  block.appendChild(tb);

  d.dom.annoList.appendChild(block);
  photo.canvas=cv;

  /* chargement image */
  var img=new Image();
  img.onload=function(){
    var mw=Math.min(img.width,760),sc=mw/img.width;
    cv.width=Math.round(img.width*sc);
    cv.height=Math.round(img.height*sc);
    var ctx=cv.getContext('2d');
    function initState(){
      photo.state={tool:'pen',color:'#d93025',size:3,drawing:false,sx:0,sy:0,snap:null,history:[ctx.getImageData(0,0,cv.width,cv.height)]};
      setupDrawing(cv,photo);
    }
    if(restored&&photo.annotated){
      var ai=new Image();
      ai.onload=function(){ctx.drawImage(ai,0,0,cv.width,cv.height);initState()};
      ai.onerror=function(){ctx.drawImage(img,0,0,cv.width,cv.height);initState()};
      ai.src=photo.annotated;
    }else{
      ctx.drawImage(img,0,0,cv.width,cv.height);
      initState();
    }
  };
  img.src=photo.src;

  /* boutons header */
  bStd.addEventListener('click',function(){photo.photoSize='standard';bStd.className='ps-btn on';bGrd.className='ps-btn';markDirty()});
  bGrd.addEventListener('click',function(){photo.photoSize='grande';bGrd.className='ps-btn on';bStd.className='ps-btn';markDirty()});
  del.addEventListener('click',function(){
    var i=d.photos.indexOf(photo);
    if(i>=0)d.photos.splice(i,1);
    block.remove();markDirty();
  });
  undoB.addEventListener('click',function(){
    var st=photo.state;
    if(st&&st.history.length>1){
      st.history.pop();
      cv.getContext('2d').putImageData(st.history[st.history.length-1],0,0);
      markDirty();
    }
  });
}

function setupDrawing(cv,photo){
  function gp(e){
    var r=cv.getBoundingClientRect();
    var sx=cv.width/r.width,sy=cv.height/r.height;
    var t=e.touches&&e.touches.length?e.touches[0]:(e.changedTouches&&e.changedTouches.length?e.changedTouches[0]:e);
    return{x:(t.clientX-r.left)*sx,y:(t.clientY-r.top)*sy};
  }
  function dn(e){
    e.preventDefault();
    var st=photo.state;if(!st)return;
    var p=gp(e);
    st.drawing=true;st.sx=p.x;st.sy=p.y;
    st.snap=cv.getContext('2d').getImageData(0,0,cv.width,cv.height);
  }
  function mv(e){
    var st=photo.state;if(!st||!st.drawing)return;
    e.preventDefault();
    var ctx=cv.getContext('2d'),p=gp(e);
    if(st.tool==='pen'){
      ctx.strokeStyle=st.color;ctx.lineWidth=st.size;ctx.lineCap='round';ctx.lineJoin='round';
      ctx.beginPath();ctx.moveTo(st.sx,st.sy);ctx.lineTo(p.x,p.y);ctx.stroke();
      st.sx=p.x;st.sy=p.y;
    }else if(st.tool==='eraser'){
      ctx.putImageData(st.snap,0,0);
      ctx.save();ctx.globalCompositeOperation='destination-out';
      ctx.beginPath();ctx.arc(p.x,p.y,st.size*4,0,Math.PI*2);ctx.fill();ctx.restore();
    }else{
      ctx.putImageData(st.snap,0,0);
      drawShape(ctx,st,st.sx,st.sy,p.x,p.y);
    }
  }
  function up(e){
    var st=photo.state;if(!st||!st.drawing)return;
    e.preventDefault();st.drawing=false;
    var ctx=cv.getContext('2d'),p=gp(e);
    if(st.tool!=='pen'&&st.tool!=='eraser'){
      ctx.putImageData(st.snap,0,0);
      drawShape(ctx,st,st.sx,st.sy,p.x,p.y);
    }
    st.history.push(ctx.getImageData(0,0,cv.width,cv.height));
    if(st.history.length>25)st.history.shift();
    markDirty();
  }
  cv.addEventListener('mousedown',dn);
  cv.addEventListener('mousemove',mv);
  cv.addEventListener('mouseup',up);
  cv.addEventListener('mouseleave',function(e){if(photo.state&&photo.state.drawing)up(e)});
  cv.addEventListener('touchstart',dn,{passive:false});
  cv.addEventListener('touchmove',mv,{passive:false});
  cv.addEventListener('touchend',up,{passive:false});
}
function drawShape(ctx,st,x1,y1,x2,y2){
  ctx.strokeStyle=st.color;ctx.lineWidth=st.size;ctx.lineCap='round';
  if(st.tool==='circle'){
    var rx=Math.abs(x2-x1)/2,ry=Math.abs(y2-y1)/2;
    ctx.beginPath();ctx.ellipse(x1+(x2-x1)/2,y1+(y2-y1)/2,Math.max(rx,4),Math.max(ry,4),0,0,Math.PI*2);ctx.stroke();
  }else if(st.tool==='arrow'){
    ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
    var a=Math.atan2(y2-y1,x2-x1),l=Math.min(24,Math.hypot(x2-x1,y2-y1)*0.4);
    ctx.beginPath();ctx.moveTo(x2,y2);
    ctx.lineTo(x2-l*Math.cos(a-Math.PI/6),y2-l*Math.sin(a-Math.PI/6));
    ctx.lineTo(x2-l*Math.cos(a+Math.PI/6),y2-l*Math.sin(a+Math.PI/6));
    ctx.closePath();ctx.fillStyle=st.color;ctx.fill();
  }
}

/* ═══ SAUVEGARDE JSON ═══ */
function downloadBlob(blob,filename){
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;a.download=filename;a.style.display='none';
  document.body.appendChild(a);
  a.click();
  setTimeout(function(){if(a.parentNode)a.remove();URL.revokeObjectURL(url)},1500);
}

      if(d.dplan&&d.dplan.image){
        h+='<div class="lab">Localisation sur plan</div>';
        h+='<div style="text-align:center"><img src="'+d.dplan.image+'" width="340" style="border:1pt solid #BDD7EE"></div>';
        if(d.dplan.markers&&d.dplan.markers.length)h+='<div class="cap">Repère(s) : '+d.dplan.markers.map(function(m){return m.num}).join(', ')+'</div>';
      }
      if(d.photos&&d.photos.length){
        h+='<div class="lab">Photos</div><div>';
        d.photos.forEach(function(p){
          var w=p.photoSize==='grande'?400:230;
          h+='<img src="'+(p.annotated||p.src)+'" width="'+w+'" style="border:1pt solid #BDD7EE;margin:3pt 4pt 3pt 0"> ';
        });
        h+='</div>';
      }
      if(d.conclusion)h+='<div class="conclu"><div class="h">Conclusion / Préconisation</div>'+escBr(d.conclusion)+'</div>';
    });
  });

  if(data.meta.conclusion_generale){
    h+='<div class="zb" style="background:#1F4E79">Conclusion générale</div>';
    h+='<div class="cg">'+escBr(data.meta.conclusion_generale)+'</div>';
  }
  h+='<div class="foot">'+esc(data.meta.expert)+' | '+esc(data.meta.adresse)+' | Rapport du '+now+'</div>';
  h+='</body></html>';

  var fname='Rapport_'+(data.meta.adresse||'expertise').replace(/[^a-zA-Z0-9_-]/g,'_').slice(0,40)+'_'+new Date().toISOString().slice(0,10)+'.doc';
  var blob=new Blob(['\ufeff'+h],{type:'application/msword'});
  downloadBlob(blob,fname);
  toast('Word téléchargé ✓ — voir Fichiers › Téléchargements');
}

/* ═══ RESTAURATION AUTO ═══ */
function checkAutoSave(){
  try{
    var saved=localStorage.getItem(AUTOSAVE_KEY);
    if(saved){
      var data=JSON.parse(saved);
      var nb=data.zones?data.zones.length:0;
      if(nb>0||(data.meta&&data.meta.adresse)){
        $('restore-text').textContent='Une session sauvegardée automatiquement a été trouvée ('+nb+' zone(s)'+(data.meta&&data.meta.adresse?' — '+data.meta.adresse:'')+'). La reprendre ?';
        $('restore-modal').className='modal show';
        return true;
      }
    }
  }catch(e){}
  return false;
}

/* ═══ ÉVÉNEMENTS GLOBAUX ═══ */
$('btn-add-zone').addEventListener('click',function(){createZone();markDirty()});
$('btn-json').addEventListener('click',saveJSON);
$('btn-word').addEventListener('click',exportWord);
$('btn-load').addEventListener('click',function(){$('session-file').click()});
$('session-file').addEventListener('change',function(){
  var f=this.files&&this.files[0];if(!f)return;
  var r=new FileReader();
  r.onload=function(e){
    try{loadFromJSON(JSON.parse(e.target.result));toast('Session rechargée ✓')}
    catch(err){toast('Fichier JSON invalide')}
  };
  r.readAsText(f);this.value='';
});
$('btn-restore').addEventListener('click',function(){
  $('restore-modal').className='modal';
  try{loadFromJSON(JSON.parse(localStorage.getItem(AUTOSAVE_KEY)));toast('Session reprise ✓')}
  catch(e){toast('Erreur de récupération');createZone()}
});
$('btn-discard').addEventListener('click',function(){
  $('restore-modal').className='modal';
  localStorage.removeItem(AUTOSAVE_KEY);
  createZone();
});
['m-adr','m-date','m-client','m-expert','m-ctx','m-conclu-gen'].forEach(function(id){
  $(id).addEventListener('input',markDirty);
});

/* ═══ INIT ═══ */
$('m-date').value=new Date().toISOString().slice(0,10);
if(!checkAutoSave())createZone();
</script>
</body>
</html>
