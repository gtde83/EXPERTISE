<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Expertise">
<meta name="theme-color" content="#1c1c1a">
<title>Expertise Chantier</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:rgba(0,0,0,0)}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;background:#f2f1ed;color:#1c1c1a;font-size:16px;-webkit-text-size-adjust:100%}
.topbar{background:#1c1c1a;color:#f2f1ed;padding:12px 16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;position:sticky;top:0;z-index:200}
.topbar-title{flex:1;font-size:13px;letter-spacing:.07em;text-transform:uppercase;font-weight:500;white-space:nowrap}
.tbtn{padding:9px 13px;border-radius:8px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.08);color:#f2f1ed;font-size:14px;cursor:pointer;font-family:inherit;-webkit-appearance:none;touch-action:manipulation;white-space:nowrap}
.tbtn:active{opacity:.7}
.tbtn.g{border-color:rgba(143,212,180,.5);background:rgba(143,212,180,.15)}
.tbtn.b{border-color:rgba(168,196,238,.5);background:rgba(168,196,238,.15)}
.offline-bar{display:none;background:#d93025;color:#fff;text-align:center;padding:6px;font-size:13px}
.main{max-width:800px;margin:0 auto;padding:18px 14px 80px}
.card{background:#fff;border:1px solid #dddbd3;border-radius:12px;padding:18px;margin-bottom:20px}
.card-title{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#aaa;margin-bottom:14px}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:480px){.fg2{grid-template-columns:1fr}}
.field{margin-bottom:0}
.field label{display:block;font-size:11px;color:#999;margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em}
.field input[type=text],.field input[type=date],.field textarea{width:100%;background:#f8f7f3;border:1px solid #dddbd3;border-radius:8px;padding:10px 12px;font-size:15px;color:#1c1c1a;font-family:inherit;-webkit-appearance:none;outline:none}
.field textarea{resize:none;line-height:1.5}
.zone-card{background:#fff;border:1px solid #dddbd3;border-radius:12px;overflow:hidden;margin-bottom:22px}
.zone-hdr{background:#1c1c1a;color:#f2f1ed;padding:13px 16px;display:flex;align-items:center;gap:10px}
.zone-hdr input{flex:1;background:transparent;border:none;color:#f2f1ed;font-size:15px;font-family:inherit;outline:none;min-width:0}
.zone-hdr input::placeholder{color:rgba(255,255,255,.3)}
.zone-body{padding:16px}
.sec{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:#bbb;margin:18px 0 10px;display:flex;align-items:center;gap:8px}
.sec:first-child{margin-top:0}
.sec::after{content:'';flex:1;height:1px;background:#ece9e0}
.sec-note{text-transform:none;letter-spacing:0;font-size:11px;color:#ccc}
.iobtn{width:100%;padding:14px;border-radius:8px;border:1.5px dashed #ccc;background:#f8f7f3;color:#999;font-size:14px;text-align:center;cursor:pointer;font-family:inherit;-webkit-appearance:none;touch-action:manipulation;display:block;margin-bottom:8px}
.iobtn:active{background:#eeede7}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.abtn{width:100%;padding:12px;border-radius:8px;border:1px solid #dddbd3;background:#f8f7f3;color:#555;font-size:14px;text-align:center;cursor:pointer;font-family:inherit;-webkit-appearance:none;touch-action:manipulation;display:block}
.abtn:active{background:#e4e2d8}
.abtn.blue{background:#e8f0fb;border-color:#a8c4ee;color:#1a5fa8}
.abtn.red{background:#fdeaea;border-color:#f0a8a8;color:#c0392b}
.photo-grid{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0 4px}
.pthumb{position:relative;width:82px;height:82px;border-radius:8px;overflow:hidden;border:1px solid #dddbd3;flex-shrink:0}
.pthumb img{width:100%;height:100%;object-fit:cover;display:block}
.pthumb .xbtn{position:absolute;top:3px;right:3px;width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,.55);border:none;color:#fff;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;touch-action:manipulation}
.plan-wrap{border-radius:8px;overflow:hidden;border:1px solid #dddbd3;margin-bottom:8px;-webkit-user-select:none;user-select:none;touch-action:none}
.plan-wrap canvas{display:block;width:100%;height:auto}
.plan-btns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:4px}
.hr{height:1px;background:#ece9e0;margin:16px 0}
.desordre{border:1px solid #dddbd3;border-radius:10px;margin-bottom:12px;overflow:hidden}
.d-hdr{background:#f2f1ed;padding:10px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #e4e2d8}
.d-hdr input{flex:1;background:transparent;border:none;font-size:14px;color:#1c1c1a;font-family:inherit;outline:none;min-width:0}
.d-hdr input::placeholder{color:#ccc}
.dbadge{background:#e8f0fb;color:#1a5fa8;font-size:12px;padding:3px 10px;border-radius:20px;white-space:nowrap;border:1px solid #a8c4ee;flex-shrink:0}
.d-body{padding:14px}
.obs-row{display:flex;gap:8px;margin-bottom:8px;align-items:flex-start}
.obs-row textarea{flex:1;background:#f8f7f3;border:1px solid #dddbd3;border-radius:8px;padding:8px 10px;font-size:14px;color:#1c1c1a;resize:none;min-height:40px;line-height:1.5;font-family:inherit;-webkit-appearance:none;outline:none}
.obs-row .xbtn2{width:36px;height:36px;flex-shrink:0;border-radius:8px;border:1px solid #f0a8a8;background:#fdeaea;color:#c0392b;cursor:pointer;font-size:16px;padding:0;touch-action:manipulation;-webkit-appearance:none;display:flex;align-items:center;justify-content:center}
.conclu{width:100%;background:#fdf3e0;border:1px solid #f0c878;border-radius:8px;padding:10px 12px;font-size:14px;color:#7a4a08;resize:none;min-height:60px;line-height:1.5;font-family:inherit;-webkit-appearance:none;outline:none}
.anno-block{border:1px solid #dddbd3;border-radius:8px;margin-bottom:10px;overflow:hidden}
.anno-hdr{background:#f2f1ed;padding:7px 12px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #e4e2d8}
.anno-hdr span{flex:1;font-size:12px;color:#888;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.anno-hdr button{width:30px;height:30px;border-radius:6px;border:1px solid #f0a8a8;background:#fdeaea;color:#c0392b;cursor:pointer;font-size:14px;padding:0;touch-action:manipulation;-webkit-appearance:none}
.anno-cv-wrap{-webkit-user-select:none;user-select:none;touch-action:none;background:#000}
.anno-cv-wrap canvas{display:block;width:100%;height:auto}
.anno-tb{display:flex;align-items:center;gap:5px;padding:8px 10px;background:#f2f1ed;border-top:1px solid #e4e2d8;flex-wrap:wrap}
.toolbtn{width:34px;height:34px;border-radius:7px;border:1px solid #dddbd3;background:#fff;cursor:pointer;font-size:17px;padding:0;touch-action:manipulation;-webkit-appearance:none;display:flex;align-items:center;justify-content:center}
.toolbtn.on{background:#e8f0fb;border-color:#a8c4ee}
.cswatch{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;flex-shrink:0;touch-action:manipulation}
.cswatch.on{border-color:#1c1c1a;transform:scale(1.18)}
.szbtn{width:30px;height:30px;border-radius:7px;border:1px solid #dddbd3;background:#fff;cursor:pointer;padding:0;touch-action:manipulation;-webkit-appearance:none;display:flex;align-items:center;justify-content:center}
.szbtn.on{background:#e8f0fb;border-color:#a8c4ee}
.sp{flex:1}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:#1c1c1a;color:#f2f1ed;padding:11px 22px;border-radius:24px;font-size:14px;opacity:0;pointer-events:none;transition:opacity .25s;z-index:9999;white-space:nowrap;max-width:90vw;text-align:center}
.toast.show{opacity:1}
</style>
</head>
<body>

<div class="topbar">
  <span class="topbar-title">📋 Expertise chantier</span>
  <button class="tbtn b" onclick="triggerLoad()">↩ Reprendre</button>
  <button class="tbtn g" onclick="saveSession()">💾 Sauvegarder</button>
  <button class="tbtn" onclick="exportWord()">📄 Word</button>
</div>
<div class="offline-bar" id="offline-bar">⚠️ Hors ligne — vos données restent disponibles</div>

<input type="file" id="session-file" accept=".json" style="position:fixed;top:-300px;left:-300px;opacity:0;width:1px;height:1px" onchange="loadSession(this)">

<div class="main">
  <div class="card">
    <div class="card-title">Informations du rapport</div>
    <div class="fg2" style="gap:12px">
      <div class="field"><label>Chantier / Adresse</label><input type="text" id="m-adr" placeholder="12 rue des Lilas, Paris"></div>
      <div class="field"><label>Date de visite</label><input type="date" id="m-date"></div>
      <div class="field"><label>Donneur d'ordre</label><input type="text" id="m-client" placeholder="Nom du client"></div>
      <div class="field"><label>Expert</label><input type="text" id="m-expert" placeholder="Votre nom"></div>
      <div class="field" style="grid-column:1/-1"><label>Contexte général</label><textarea id="m-ctx" rows="2" placeholder="Description générale, contexte de la mission…"></textarea></div>
    </div>
  </div>
  <div id="zones"></div>
  <button class="abtn blue" onclick="addZone()" style="padding:15px;font-size:15px;margin-top:4px">+ Ajouter une zone</button>
</div>

<div class="toast" id="toast"></div>

<script>
var ZC=0,DC={},PD={},ZPH={},AD={};
var COLS=['#d93025','#e67e22','#27ae60','#2980d9','#ffffff','#1c1c1a'];
var SIZES=[3,7,14];
var TOOLS=['pen','circle','arrow','eraser'];
var TICO={pen:'✏️',circle:'⭕',arrow:'↗️',eraser:'⌫'};

/* PWA */
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').catch(function(){});
}
window.addEventListener('online',function(){document.getElementById('offline-bar').style.display='none'});
window.addEventListener('offline',function(){document.getElementById('offline-bar').style.display='block'});
if(!navigator.onLine)document.getElementById('offline-bar').style.display='block';

function toast(m){var t=document.getElementById('toast');t.textContent=m;t.className='toast show';setTimeout(function(){t.className='toast'},2800)}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')}
function val(id){var e=document.getElementById(id);return e?e.value:''}
function setVal(id,v){var e=document.getElementById(id);if(e)e.value=v||''}
function rmEl(id){var e=document.getElementById(id);if(e)e.remove()}

/* FILE PICKER — méthode compatible iPad Safari */
function pickFile(accept,multiple,capture,cb){
  var old=document.getElementById('__fp');if(old)old.remove();
  var inp=document.createElement('input');
  inp.type='file';inp.id='__fp';inp.accept=accept||'*/*';
  if(multiple)inp.multiple=true;
  if(capture)inp.setAttribute('capture',capture);
  inp.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;opacity:0;z-index:9998';
  document.body.appendChild(inp);
  inp.addEventListener('change',function(){
    if(inp.files&&inp.files.length)cb(inp.files);
    setTimeout(function(){inp.remove()},500);
  });
  inp.addEventListener('cancel',function(){setTimeout(function(){inp.remove()},500)});
  inp.click();
}

/* ZONE */
function addZone(data){
  ZC++;var zid='z'+ZC;DC[zid]=0;ZPH[zid]=[];
  PD[zid]={img:null,markers:[],imgObj:null,canvas:null,ctx:null};
  var w=document.createElement('div');w.id=zid+'-w';
  w.innerHTML='<div class="zone-card" id="'+zid+'-card">'+
    '<div class="zone-hdr">'+
      '<span style="font-size:11px;opacity:.45;white-space:nowrap;letter-spacing:.06em;text-transform:uppercase">Zone '+ZC+'</span>'+
      '<input id="'+zid+'-ti" type="text" placeholder="Façade Sud, Cave, Toiture…" value="'+esc(data&&data.zone||'')+'">'+
      '<button class="tbtn" style="padding:7px 10px;font-size:13px;background:rgba(220,60,60,.2);border-color:rgba(220,60,60,.35)" onclick="rmEl(\''+zid+'-w\')">✕</button>'+
    '</div>'+
    '<div class="zone-body">'+
      '<div class="sec">Description de la zone</div>'+
      '<textarea id="'+zid+'-desc" style="width:100%;background:#f8f7f3;border:1px solid #dddbd3;border-radius:8px;padding:10px 12px;font-size:14px;color:#1c1c1a;resize:none;min-height:52px;line-height:1.5;font-family:inherit;-webkit-appearance:none;outline:none" placeholder="Contexte, accès, état général…" rows="2">'+esc(data&&data.description||'')+'</textarea>'+
      '<div class="sec" style="margin-top:18px">Plan de la zone <span class="sec-note"> — tapez sur le plan pour poser un repère numéroté</span></div>'+
      '<button class="iobtn" id="'+zid+'-pe" onclick="importPlan(\''+zid+'\')">📐  Importer un plan depuis la photothèque</button>'+
      '<div id="'+zid+'-pw" style="display:none">'+
        '<div class="plan-wrap" id="'+zid+'-pcw"><canvas id="'+zid+'-pc"></canvas></div>'+
        '<div class="plan-btns">'+
          '<button class="abtn" onclick="undoMk(\''+zid+'\')">↩ Annuler</button>'+
          '<button class="abtn" onclick="clearMk(\''+zid+'\')">🗑 Effacer</button>'+
          '<button class="abtn red" onclick="removePlan(\''+zid+'\')">✕ Changer</button>'+
        '</div>'+
      '</div>'+
      '<div class="sec" style="margin-top:18px">Photos générales de la zone</div>'+
      '<div class="row2">'+
        '<button class="abtn" onclick="addZP(\''+zid+'\',true)">📷 Prendre une photo</button>'+
        '<button class="abtn" onclick="addZP(\''+zid+'\',false)">🖼 Photothèque</button>'+
      '</div>'+
      '<div class="photo-grid" id="'+zid+'-zpg"></div>'+
      '<div class="hr"></div>'+
      '<div id="'+zid+'-ds"></div>'+
      '<button class="abtn blue" style="padding:13px;margin-top:2px" onclick="addDesordre(\''+zid+'\')">+ Ajouter un désordre</button>'+
    '</div></div>';
  document.getElementById('zones').appendChild(w);
  if(data&&data.plan&&data.plan.image)restorePlan(zid,data.plan);
  if(data&&data.photos_zone)data.photos_zone.forEach(function(p){restoreZP(zid,p)});
  if(data&&data.desordres&&data.desordres.length)data.desordres.forEach(function(d){addDesordre(zid,d)});
  else addDesordre(zid);
}

/* PLAN */
function importPlan(zid){
  pickFile('image/*',false,false,function(files){
    var r=new FileReader();
    r.onload=function(e){PD[zid].img=e.target.result;PD[zid].markers=[];initPlan(zid,e.target.result,[])};
    r.readAsDataURL(files[0]);
  });
}
function restorePlan(zid,p){PD[zid].img=p.image;PD[zid].markers=p.markers||[];initPlan(zid,p.image,p.markers||[])}
function initPlan(zid,src,markers){
  document.getElementById(zid+'-pe').style.display='none';
  document.getElementById(zid+'-pw').style.display='block';
  var cv=document.getElementById(zid+'-pc');PD[zid].canvas=cv;PD[zid].markers=markers||[];
  var img=new Image();
  img.onload=function(){
    var mw=Math.min(img.width,760);var sc=mw/img.width;
    cv.width=Math.round(img.width*sc);cv.height=Math.round(img.height*sc);
    PD[zid].imgObj=img;PD[zid].ctx=cv.getContext('2d');
    redrawPlan(zid);
  };img.src=src;
  var wrap=document.getElementById(zid+'-pcw');
  function planTap(ev){
    var r=cv.getBoundingClientRect();var sx=cv.width/r.width;var sy=cv.height/r.height;
    var x,y;
    if(ev.changedTouches){x=(ev.changedTouches[0].clientX-r.left)*sx;y=(ev.changedTouches[0].clientY-r.top)*sy}
    else{x=(ev.clientX-r.left)*sx;y=(ev.clientY-r.top)*sy}
    PD[zid].markers.push({x:x,y:y,num:PD[zid].markers.length+1});redrawPlan(zid);
  }
  wrap.addEventListener('touchend',function(e){e.preventDefault();planTap(e)},{passive:false});
  wrap.addEventListener('click',planTap);
}
function undoMk(zid){if(PD[zid].markers.length){PD[zid].markers.pop();redrawPlan(zid)}}
function clearMk(zid){PD[zid].markers=[];redrawPlan(zid)}
function removePlan(zid){
  PD[zid]={img:null,markers:[],imgObj:null,canvas:null,ctx:null};
  document.getElementById(zid+'-pe').style.display='';
  document.getElementById(zid+'-pw').style.display='none';
}
function redrawPlan(zid){
  var pd=PD[zid];if(!pd.ctx||!pd.imgObj)return;
  var cv=pd.canvas;pd.ctx.clearRect(0,0,cv.width,cv.height);pd.ctx.drawImage(pd.imgObj,0,0,cv.width,cv.height);
  pd.markers.forEach(function(m){
    pd.ctx.fillStyle='#d93025';pd.ctx.beginPath();pd.ctx.arc(m.x,m.y,17,0,Math.PI*2);pd.ctx.fill();
    pd.ctx.strokeStyle='#fff';pd.ctx.lineWidth=2.5;pd.ctx.beginPath();pd.ctx.arc(m.x,m.y,17,0,Math.PI*2);pd.ctx.stroke();
    pd.ctx.fillStyle='#fff';pd.ctx.font='bold 14px -apple-system,Arial';pd.ctx.textAlign='center';pd.ctx.textBaseline='middle';
    pd.ctx.fillText(m.num,m.x,m.y);
  });
}

/* ZONE PHOTOS */
function addZP(zid,cam){pickFile('image/*',!cam,cam?'environment':false,function(files){Array.from(files).forEach(function(f){var r=new FileReader();r.onload=function(e){restoreZP(zid,{src:e.target.result,name:f.name})};r.readAsDataURL(f)})})}
function restoreZP(zid,p){
  var idx=ZPH[zid].length;ZPH[zid].push(p);
  var g=document.getElementById(zid+'-zpg');
  var t=document.createElement('div');t.className='pthumb';t.id=zid+'_zp'+idx;
  t.innerHTML='<img src="'+p.src+'"><button class="xbtn" onclick="ZPH[\''+zid+'\']['+idx+']=null;rmEl(\''+zid+'_zp'+idx+'\')">✕</button>';
  g.appendChild(t);
}

/* DÉSORDRE */
function addDesordre(zid,data){
  DC[zid]++;var num=DC[zid];var did=zid+'_d'+num;AD[did]=[];
  var c=document.getElementById(zid+'-ds');
  var d=document.createElement('div');d.className='desordre';d.id=did;
  d.innerHTML='<div class="d-hdr">'+
    '<span class="dbadge">Désordre '+num+'</span>'+
    '<input id="'+did+'-ti" type="text" placeholder="Fissure, Infiltration, Affaissement…" value="'+esc(data&&data.titre||'')+'">'+
    '<button class="tbtn" style="padding:6px 10px;font-size:12px;background:rgba(220,60,60,.15);border-color:rgba(220,60,60,.3)" onclick="rmEl(\''+did+'\')">✕</button>'+
  '</div>'+
  '<div class="d-body">'+
    '<div class="sec" style="margin-top:0">Observations</div>'+
    '<div id="'+did+'-obs"></div>'+
    '<button class="abtn" style="margin-bottom:14px" onclick="addObs(\''+did+'\')">+ Ajouter une observation</button>'+
    '<div class="hr"></div>'+
    '<div class="sec">Photos annotées <span class="sec-note"> — dessinez sur la photo après import</span></div>'+
    '<div class="row2">'+
      '<button class="abtn" onclick="addAP(\''+did+'\',true)">📷 Prendre une photo</button>'+
      '<button class="abtn" onclick="addAP(\''+did+'\',false)">🖼 Photothèque</button>'+
    '</div>'+
    '<div id="'+did+'-al" style="margin-top:10px"></div>'+
    '<div class="hr"></div>'+
    '<div class="sec">Conclusion / Préconisation</div>'+
    '<textarea class="conclu" id="'+did+'-conclu" rows="2" placeholder="Réparation préconisée, urgence, suite à donner…">'+esc(data&&data.conclusion||'')+'</textarea>'+
  '</div>';
  c.appendChild(d);
  if(data&&data.observations&&data.observations.length)data.observations.forEach(function(o){addObs(did,o)});
  else addObs(did);
  if(data&&data.photos)data.photos.forEach(function(p){buildAnno(did,p,true)});
}

function addObs(did,v){
  var c=document.getElementById(did+'-obs');
  var row=document.createElement('div');row.className='obs-row';
  row.innerHTML='<textarea rows="1" placeholder="Décrire l\'observation…" oninput="this.style.height=\'auto\';this.style.height=this.scrollHeight+\'px\'">'+esc(v||'')+'</textarea>'+
    '<button class="xbtn2" onclick="this.parentElement.remove()">✕</button>';
  c.appendChild(row);
}

/* ANNOTATION */
function addAP(did,cam){pickFile('image/*',!cam,cam?'environment':false,function(files){Array.from(files).forEach(function(f){var r=new FileReader();r.onload=function(e){buildAnno(did,{src:e.target.result,name:f.name},false)};r.readAsDataURL(f)})})}

function buildAnno(did,p,restored){
  var idx=AD[did].length;var aid=did+'_a'+idx;
  var entry={src:p.src,name:p.name,annotated:p.annotated||null,canvasRef:null,state:null};
  AD[did].push(entry);
  var block=document.createElement('div');block.className='anno-block';block.id=aid;
  var hdr=document.createElement('div');hdr.className='anno-hdr';
  hdr.innerHTML='<span>'+esc(p.name)+'</span><button onclick="AD[\''+did+'\']['+idx+']=null;rmEl(\''+aid+'\')">✕</button>';
  block.appendChild(hdr);
  var cw=document.createElement('div');cw.className='anno-cv-wrap';
  var cv=document.createElement('canvas');cw.appendChild(cv);block.appendChild(cw);
  // toolbar
  var tb=document.createElement('div');tb.className='anno-tb';
  TOOLS.forEach(function(tool){
    var b=document.createElement('button');b.className='toolbtn'+(tool==='pen'?' on':'');
    b.id=aid+'-t-'+tool;b.textContent=TICO[tool];
    b.addEventListener('click',function(){setTool(aid,tool)});tb.appendChild(b);
  });
  tb.appendChild(Object.assign(document.createElement('div'),{style:'width:4px'}));
  COLS.forEach(function(col){
    var s=document.createElement('div');s.className='cswatch'+(col==='#d93025'?' on':'');
    s.style.background=col;if(col==='#ffffff')s.style.outline='1px solid #ccc';
    s.id=aid+'-col-'+col.replace('#','');
    s.addEventListener('click',function(){setCol(aid,col)});tb.appendChild(s);
  });
  tb.appendChild(Object.assign(document.createElement('div'),{style:'width:4px'}));
  SIZES.forEach(function(sz,si){
    var b=document.createElement('button');b.className='szbtn'+(si===0?' on':'');b.id=aid+'-sz-'+sz;
    var ss=sz+8;b.innerHTML='<svg width="'+ss+'" height="'+ss+'"><circle cx="'+(ss/2)+'" cy="'+(ss/2)+'" r="'+(sz/2+1)+'" fill="currentColor"/></svg>';
    b.addEventListener('click',function(){setSz(aid,sz)});tb.appendChild(b);
  });
  var sp=document.createElement('div');sp.className='sp';tb.appendChild(sp);
  var ub=document.createElement('button');ub.className='toolbtn';ub.textContent='↩';
  ub.addEventListener('click',function(){undoA(aid)});tb.appendChild(ub);
  block.appendChild(tb);
  document.getElementById(did+'-al').appendChild(block);
  var img=new Image();
  img.onload=function(){
    var mw=Math.min(img.width,760);var sc=mw/img.width;
    cv.width=Math.round(img.width*sc);cv.height=Math.round(img.height*sc);
    var ctx=cv.getContext('2d');
    if(restored&&entry.annotated){var ai=new Image();ai.onload=function(){ctx.drawImage(ai,0,0,cv.width,cv.height)};ai.src=entry.annotated}
    else ctx.drawImage(img,0,0,cv.width,cv.height);
    var st={tool:'pen',color:'#d93025',size:3,drawing:false,sx:0,sy:0,snap:null,history:[ctx.getImageData(0,0,cv.width,cv.height)]};
    entry.canvasRef=cv;entry.state=st;
    setupAnno(cv,st);
  };img.src=p.src;
}

function setupAnno(cv,s){
  function gp(e){
    var r=cv.getBoundingClientRect();var sx=cv.width/r.width;var sy=cv.height/r.height;
    var src=e.touches?e.touches[0]:(e.changedTouches?e.changedTouches[0]:e);
    return{x:(src.clientX-r.left)*sx,y:(src.clientY-r.top)*sy};
  }
  function dn(e){e.preventDefault();var p=gp(e);s.drawing=true;s.sx=p.x;s.sy=p.y;s.snap=cv.getContext('2d').getImageData(0,0,cv.width,cv.height)}
  function mv(e){
    if(!s.drawing)return;e.preventDefault();
    var ctx=cv.getContext('2d');var p=gp(e);
    if(s.tool==='pen'){ctx.strokeStyle=s.color;ctx.lineWidth=s.size;ctx.lineCap='round';ctx.lineJoin='round';ctx.beginPath();ctx.moveTo(s.sx,s.sy);ctx.lineTo(p.x,p.y);ctx.stroke();s.sx=p.x;s.sy=p.y}
    else if(s.tool==='eraser'){ctx.putImageData(s.snap,0,0);ctx.save();ctx.globalCompositeOperation='destination-out';ctx.beginPath();ctx.arc(p.x,p.y,s.size*4,0,Math.PI*2);ctx.fill();ctx.restore()}
    else{ctx.putImageData(s.snap,0,0);drawSh(ctx,s,s.sx,s.sy,p.x,p.y)}
  }
  function up(e){
    if(!s.drawing)return;e.preventDefault();s.drawing=false;
    var ctx=cv.getContext('2d');var p=gp(e);
    if(s.tool!=='pen'&&s.tool!=='eraser'){ctx.putImageData(s.snap,0,0);drawSh(ctx,s,s.sx,s.sy,p.x,p.y)}
    s.history.push(ctx.getImageData(0,0,cv.width,cv.height));
  }
  cv.addEventListener('mousedown',dn);cv.addEventListener('mousemove',mv);cv.addEventListener('mouseup',up);
  cv.addEventListener('touchstart',dn,{passive:false});cv.addEventListener('touchmove',mv,{passive:false});cv.addEventListener('touchend',up,{passive:false});
}

function drawSh(ctx,s,x1,y1,x2,y2){
  ctx.strokeStyle=s.color;ctx.lineWidth=s.size;ctx.lineCap='round';
  if(s.tool==='circle'){var rx=Math.abs(x2-x1)/2;var ry=Math.abs(y2-y1)/2;ctx.beginPath();ctx.ellipse(x1+(x2-x1)/2,y1+(y2-y1)/2,Math.max(rx,4),Math.max(ry,4),0,0,Math.PI*2);ctx.stroke()}
  else if(s.tool==='arrow'){ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();var a=Math.atan2(y2-y1,x2-x1);var l=Math.min(24,Math.hypot(x2-x1,y2-y1)*0.4);ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x2-l*Math.cos(a-Math.PI/6),y2-l*Math.sin(a-Math.PI/6));ctx.lineTo(x2-l*Math.cos(a+Math.PI/6),y2-l*Math.sin(a+Math.PI/6));ctx.closePath();ctx.fillStyle=s.color;ctx.fill()}
}

function findEntry(aid){for(var did in AD){var idx=parseInt(aid.split('_a')[1]);if(AD[did][idx]&&did+'_a'+idx===aid)return AD[did][idx]}return null}
function setTool(aid,tool){TOOLS.forEach(function(t){var b=document.getElementById(aid+'-t-'+t);if(b)b.className='toolbtn'+(t===tool?' on':'')});var e=findEntry(aid);if(e&&e.state)e.state.tool=tool}
function setCol(aid,col){COLS.forEach(function(c){var d=document.getElementById(aid+'-col-'+c.replace('#',''));if(d)d.className='cswatch'+(c===col?' on':'')});var e=findEntry(aid);if(e&&e.state)e.state.color=col}
function setSz(aid,sz){SIZES.forEach(function(s){var b=document.getElementById(aid+'-sz-'+s);if(b)b.className='szbtn'+(s===sz?' on':'')});var e=findEntry(aid);if(e&&e.state)e.state.size=sz}
function undoA(aid){var e=findEntry(aid);if(e&&e.state&&e.state.history.length>1){e.state.history.pop();e.canvasRef.getContext('2d').putImageData(e.state.history[e.state.history.length-1],0,0)}}

/* COLLECT */
function collect(){
  var meta={adresse:val('m-adr'),date:val('m-date'),client:val('m-client'),expert:val('m-expert'),contexte:val('m-ctx')};
  var zones=[];
  document.querySelectorAll('[id$="-w"]').forEach(function(w){
    if(!w.querySelector('.zone-card'))return;
    var zid=w.id.replace('-w','');
    var pd=PD[zid];var planImg=null;
    if(pd&&pd.canvas&&pd.img)planImg=pd.canvas.toDataURL('image/jpeg',.82);
    var zph=(ZPH[zid]||[]).filter(Boolean);
    var desordres=[];
    w.querySelectorAll('.desordre').forEach(function(db,i){
      var did=db.id;
      var obs=[];db.querySelectorAll('.obs-row textarea').forEach(function(ta){if(ta.value.trim())obs.push(ta.value.trim())});
      var photos=(AD[did]||[]).filter(Boolean).map(function(p){return{name:p.name,src:p.src,annotated:p.canvasRef?p.canvasRef.toDataURL('image/jpeg',.82):p.src}});
      desordres.push({numero:i+1,titre:val(did+'-ti'),observations:obs,photos:photos,conclusion:val(did+'-conclu')});
    });
    zones.push({zone:val(zid+'-ti'),description:val(zid+'-desc'),plan:{image:planImg,markers:pd?pd.markers:[]},photos_zone:zph,desordres:desordres});
  });
  return{meta:meta,zones:zones};
}

/* SAVE / LOAD */
function saveSession(){
  var data=collect();
  var name=(data.meta.adresse||'expertise').replace(/[^a-zA-Z0-9_-]/g,'_').slice(0,40);
  var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download=name+'_'+new Date().toISOString().slice(0,10)+'.json';
  document.body.appendChild(a);a.click();setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(url)},400);
  toast('Session sauvegardée ✓');
}
function triggerLoad(){document.getElementById('session-file').click()}
function loadSession(inp){
  if(!inp.files||!inp.files[0])return;
  var r=new FileReader();
  r.onload=function(e){
    try{
      var data=JSON.parse(e.target.result);
      setVal('m-adr',data.meta.adresse);setVal('m-date',data.meta.date);
      setVal('m-client',data.meta.client);setVal('m-expert',data.meta.expert);setVal('m-ctx',data.meta.contexte);
      document.getElementById('zones').innerHTML='';
      ZC=0;DC={};PD={};ZPH={};AD={};
      data.zones.forEach(function(z){addZone(z)});
      toast('Session rechargée ✓');
    }catch(err){toast('Erreur : fichier invalide')}
  };r.readAsText(inp.files[0]);inp.value='';
}

  h+='<h1>Rapport d\'expertise</h1>';
  h+='<table><tr><th>Chantier</th><td>'+esc(data.meta.adresse)+'</td><th>Date</th><td>'+esc(data.meta.date)+'</td></tr>';
  h+='<tr><th>Donneur d\'ordre</th><td>'+esc(data.meta.client)+'</td><th>Expert</th><td>'+esc(data.meta.expert)+'</td></tr>';

    if(zone.photos_zone&&zone.photos_zone.length){h+='<p style="font-size:10pt;font-weight:bold;margin-top:10pt">Photos de la zone</p><div class="photos">';zone.photos_zone.forEach(function(p){h+='<img src="'+p.src+'">'});h+='</div>'}
    zone.desordres.forEach(function(d){
      h+='<h3>'+(zi+1)+'.'+d.numero+' — Désordre n°'+d.numero+(d.titre?' : '+esc(d.titre):'')+'</h3>';
      if(d.observations&&d.observations.length){h+='<table><tr><th style="width:26px">#</th><th>Observation</th></tr>';d.observations.forEach(function(o,oi){h+='<tr><td style="text-align:center;color:#888">'+(oi+1)+'</td><td>'+esc(o)+'</td></tr>'});h+='</table>'}
      if(d.photos&&d.photos.length){h+='<div class="photos">';d.photos.forEach(function(p){h+='<img src="'+(p.annotated||p.src)+'">'});h+='</div>'}
      if(d.conclusion)h+='<div class="conclu"><strong>Conclusion / Préconisation :</strong> '+esc(d.conclusion)+'</div>';
    });
  });
  h+='</body></html>';
  var blob=new Blob([h],{type:'application/msword'});
  var url=URL.createObjectURL(blob);
  var fname=(data.meta.adresse||'expertise').replace(/[^a-zA-Z0-9_-]/g,'_').slice(0,40);
  var a=document.createElement('a');a.href=url;a.download='Rapport_'+fname+'_'+new Date().toISOString().slice(0,10)+'.doc';
